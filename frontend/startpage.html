<!DOCTYPE html>
<html lang="en">
<head>
    <title>StudyHacker</title>
    <link rel="stylesheet" href="startpage.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="page-top">
        <img class="nature-image" src="images/naturbild.png" alt="Naturbild">
        <div class="logo">
            StudyHelper
        </div>
    </div>


    <div class="main">
        <div class="menu">
            <div class="buttons">
                <div class="input-dropdown">
                    <button class="button" type="button">
                        ▼ Add Board
                    </button>
                    <div class="input">
                        <input class="enter-name" type="text" placeholder="Enter Board Name">
                        <button class="add-button" type="button" onclick="new_board()">Add</button>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="button" type="button">
                        ▼ Your boards
                    </button>
                    <div class="alternatives">
                        <a href="">Personal Boards</a>
                        <a href="">Group Boards</a>
                        <a href="">All Boards</a>
                    </div>
                </div>
            </div>

            <p class="page-name">Your boards</p>

            <div class="sound">
                <button class="sound-button">
                    &#X1F50A;
                </button>
            </div>
        </div>
        
        
        <div class="boards-container">
        </div>
        
    </div>
    
    <script>
        function new_board() {
            const new_board = document.createElement("a"); // skapar en a-tag, klickbar

            new_board.textContent = "Board name";// Rubrik på boarden
            new_board.href = "boardpage.html"; // Vart vi ska när vi klickar på boarden
            
            new_board.classList.add("board"); // Ger klassen board till elementet
            // const boards_container = document.getElementById("boards-container"); // Lägg till vårt nya element på en id
            const boards_container = document.querySelector(".boards-container"); // Lägg till vårt nya element på en class

            boards_container.appendChild(new_board);
            
            console.log("Works");
        }
    </script>
</body>
</html>
