<!DOCTYPE html>
<html lang="en">
<head>
    <title>StudyHacker</title>
    <link rel="stylesheet" href="startpage.css">
</head>

<body>
    <div>
        <!-- <p id="title">StudyHelper</p> -->
        <img class="startimage" src="images/natur-startsida.png" alt="Naturbild">
    </div>

    <div id="all_boards">

        <div id="boards_head">
            <button class="create_board" type="button" onclick="new_board()">
                Create board
            </button>
            
            <h1>
                Dina boards
            </h1>
        </div>
        
        
        <div id="boards-container">
        </div>
        
    </div>
    
    <script>
        function new_board() {
            const new_board = document.createElement("a");
            new_board.textContent = "New board";
            new_board.href = "boardpage.html";
            new_board.classList.add("board");
            const boards_container = document.getElementById("boards-container");
            boards_container.appendChild(new_board);
            console.log("Works");
        }
    </script>
</body>
</html>
