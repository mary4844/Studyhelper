    <form id="Add task">
        <input id ="name" placeholder="Task name">
        <button type="button" onclick="add_task()"> ✚ Add task</button>
    </form>
    

    <ul id="taskList"></ul>
    
    <script>
        const list = document.getElementById("taskList");
        function loadTasks() {
            fetch("/tasks")
            .then(res => res.json())
            .then(tasks => {
                list.innerHTML = ""; // clear list
            tasks.forEach(task => {
                const li = document.createElement("li");
                li.textContent = task.task_name;
                list.appendChild(li);
            });
            }); 
        }

        const form = document.getElementById('Add task')
        const nameInput = document.getElementById('name');
        
        
        function add_task() {
            // event.preventDefault() // prevents the form from refreshing the page when submitted
            console.log("entered add task")
            const name = nameInput.value

            fetch("/tasks/add", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({name})
            })
            
            .then(res => res.json())
            .then(() => {
                nameInput.value = "";
                loadTasks(); // reload tasks
            });
            // .then(task =>)
        }
