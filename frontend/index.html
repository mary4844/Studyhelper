<!DOCTYPE html>
<html lang="en">
<head>
    <title>StudyHelper</title>
    <link rel="stylesheet" href="startpage.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Meningen att den här ska göra att sidan anpassar beroende vilken enhet den används på , till exempel mobil, dator, ipad-->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="page-top">
        <img class="nature-image" src="images/naturbild.png" alt="Naturbild">
        <div class="logo">
            StudyHelper
        </div>
    </div>


    <div class="main">
        <div class="menu">

            <div class="buttons">
                <div class="input-dropdown">
                    <button class="button" type="button" id="addBoardBtn">
                        ▼ Add Board
                    </button>
                    <div class="input">
                        <input class="enter-name" type="text" placeholder="Enter Board Name" required> 
                        <label>
                            <input type="radio" name="board-type" value="personal"> Personal board
                        </label>
                        <label>
                            <input type="radio" name="board-type" value="group"> Group board
                        </label>

                        <button class="add-button" type="button" onclick="new_board()">Add</button>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="button" type="button" onclick="show_alterntive_boards()">
                        ▼ Your boards
                    </button>
                    <div class="alternatives">
                        <a href="#" role="button" onclick="personal_boards()"> Personal Boards</a>
                        <a href="#" role="button" onclick="group_boards()">Group Boards</a>
                        <a href="#" role="button" onclick="group_boards()">All Boards</a>
                    </div>
                </div>
            </div>

            <p class="page-name">Your boards</p>

            <div class="sound">
                <button class="sound-button">
                    &#X1F50A;
                </button>
                <div class="sound-options">
                    <!-- <audio controls autoplay muted loop src="">
                        White noise
                    </audio>
                    <audio controls autoplay muted loop src="">
                        Brown noise
                    </audio>
                    <audio controls autoplay muted loop src="">
                        White noise
                    </audio> -->
                    <div class="audio">
                        <p>White noise</p>
                        <audio controls autoplay muted loop>
                            <source src="music/City lights - Patrick Patrikios.mp3" type="audio/mpeg">
                            <source src="City lights - Patrick Patrikios.wav" type="audio/wav">
                        </audio>
                    </div>
                    <div class="audio">
                        <p>Brown noise</p>
                        <audio controls autoplay muted loop>
                            <source src="music/City lights - Patrick Patrikios.mp3" type="audio/mpeg">
                            <source src="City lights - Patrick Patrikios.wav" type="audio/wav">
                        </audio>
                    </div>
                    <div class="audio">
                        <p>Pink noise</p>
                        <audio controls autoplay muted loop>
                            <source src="music/City lights - Patrick Patrikios.mp3" type="audio/mpeg">
                            <source src="City lights - Patrick Patrikios.wav" type="audio/wav">
                        </audio>
                    </div>
                </div>
            </div>
        </div>
        
        <button id="testBtn">Testknapp</button>
        
        <div class="boards-container">
        </div>
        
    </div>
    
    <script type="module" src="scripts/index.js"></script>
</body>
</html>
