<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boardpage</title>
    
</head>
<body style="background-color:LightBlue;">   
    <h1 style="background-color:LightSeaGreen">Boardname</h1>
    <picture>
        <source
            srcset="images/natur.jpg"
            media="(orientation: portrait) " />
        <img src = "images/natur.jpg" alt = ""/>
        
    </picture>
        
  
    

    <a href="startpage.html">  <!-- Knapp för att komma till homepage -->
        <button type="button">Hem</button>
    </a>

    <!-- skelett för hur en lista med tasks kan se ut -->
    <div style="border: 1px solid black;">
        <h2>Name of Task List</h2>
        <ul id="TaskList">
            <li>task 1</li>
            <li> task 2</li> 
        </ul>
        <form id="Add task">
            <input id ="name" placeholder="Task name">
            <button type="button" onclick="add_task()"> ✚ Add task</button>
        </form>
    </div> 

    <script>
        
        const list = document.getElementById("TaskList");

        function loadTasks() {
            fetch("/tasks")
            .then(res => res.json())
            .then(tasks => {
                list.innerHTML = ""; // clear list
            tasks.forEach(task => {
                const li = document.createElement("li");
                li.textContent = task.task_name;
                list.appendChild(li);
                });
            });
        }

        const nameInput = document.getElementById('name');

        function addTask() {
            const input = document.getElementById("name"); // fetching entered task name

            fetch("/tasks", { // calls backend server, writing task name to the server
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                title: input.value
                })
            })
            
            .then(res => res.json()) // turning the response from the backend to JSON style
            .then(() => {
                input.value = ""; // emptying a buffer which otherwise still would hold the old name when adding a new task
                loadTasks(); // meant to update the page to show the newly added task in the list
            });
        }

        
    </script>

</body>

</html>
