<!DOCTYPE html>
<html>
  <body>
    <h2>Socket.IO Board Test</h2>

    <br /><br />

    <h3>boards</h3>
    <input id="boardName" placeholder="new board" />
    <button id="createBoard">Create board</button> 

    <button id="deleteAllBoards">Delete boards</button>

    <ul id = "boardList"></ul>

    <br /><br />

    <input id="boardJoin" placeholder="board to join" />
    <button id="joinBoard">Join board</button>

    <br /><br />

    <h3 id="currentBoard">No board selected</h3>

    <br /><br />

    <h3>tasks</h3>
    <input id="taskName" placeholder = "new task" />
    <button id="createTask">Create task</button>

    <br /><br />

    <button id = "deleteTasksInBoard">Delete tasks in board</button>

    <ul id = "taskList"></ul>

    <br /><br />

    <!-- <button id="deleteAllTasks">Delete all tasks</button> -->

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
      const socket = io("http://localhost:3000");

      const boardInput = document.getElementById("boardName");

      const taskInput = document.getElementById("taskName");

      const boardList = document.getElementById("boardList");

      const taskList = document.getElementById("taskList");

      const boardIdInput = document.getElementById("boardJoin");

      let boardId = null;
   
      socket.on("connect", () => {
        console.log("Connected:", socket.id);
        loadBoards();
      });


      // ---------------- CREATE ----------------
      document.getElementById("createTask").addEventListener("click", async () => {
        if (!boardId) { alert("Join a board first!"); return; }
        console.log("created new task");
        await createTask();
        await loadTasks(boardId);
      })

      async function createTask() {
            const taskName = taskInput.value;

            const res = await fetch("/tasks", { // calls backend server, writing task name to the server
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ name: taskName, boardId })
            })
            
            const task = await res.json();
            console.log(task);
            taskInput.value = ""; // emptying a buffer which otherwise still would hold the old name when adding a new task
        }

      document.getElementById("createBoard").addEventListener("click", async () => {
        console.log("created new board");
        await createBoard();
        await loadBoards();
      })
      

      async function createBoard() {
        const boardName = boardInput.value;

        const res = await fetch("/boards", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ boardName })
        });

        const board = await res.json();
        console.log(board);
        boardInput.value = "";
      }

      // ---------------- DELETE ALL ----------------
      document.getElementById("deleteAllBoards").addEventListener("click", async () => {
        console.log("Deleted all boards");
        await deleteAllBoards();
        await loadBoards();
      })

      async function deleteAllBoards() {

        await fetch("/boards", {
          method: "DELETE" 
        })
      }


      // document.getElementById("deleteAllTasks").addEventListener("click", async () => {
      //   console.log("Deleted all tasks");
      //   await deleteAllTasks();
      //   await loadTasks(boardId);
      // })

      // async function deleteAllTasks() {
        
      //   await fetch("/tasks", {
      //     method: "DELETE"
      //   })
      // }

      document.getElementById("deleteTasksInBoard").addEventListener("click", async () => {
        if (!boardId) { alert("Join a board first!"); return; }
        console.log("Deleted all tasks in this board");
        await deleteAllBoardTasks(boardId);
        await loadTasks(boardId);
      })

      async function deleteAllBoardTasks(boardId) {

        await fetch(`/tasks/board/${boardId}`, {
          method: "DELETE"
        })
      }

      // ---------------- SOCKET EVENTS ----------------

      socket.on("task created", (newTask) => {
        console.log("Task created", newTask);
        loadTasks(boardId);
      });
          
      socket.on("boardtasks deleted", () => {
        console.log("boardtasks deleted!")
        loadTasks(boardId);
        });

      socket.on("all tasks deleted", () => {
        console.log("All tasks deleted!")
        loadTasks(boardId);
        });

      
      // ----------------- LOAD ALL BOARDS ------------------

      async function loadBoards() {
        fetch("/boards")
        .then(res => res.json())
        .then(boards => {
          boardList.innerHTML = "";
          
          boards.forEach(board => {
            const li = document.createElement("li");
            li.textContent = board.board_name;
            boardList.appendChild(li);
          });
        });   
      }
    

    //  --------------------- LOAD BOARD SPECIFIC TASKS --------------------- 

      async function loadTasks(boardId) {

        const res = await fetch(`/tasks/board/${boardId}`);
        const tasks = await res.json();

        if (!Array.isArray(tasks)) {  //guard for error responses
          console.error("Failed to load tasks:", tasks);
          return;
        }

        taskList.innerHTML = "";

        tasks.forEach(task => {
          const li = document.createElement("li");
          li.textContent = task.task_name;
          taskList.appendChild(li);
        });
      }


    // --------------------------- JOIN BOARD ------------------------------
      
      document.getElementById("joinBoard").addEventListener("click", async () => {
        const input = document.getElementById("boardJoin").value;

        await joinBoard(input);
      });

      async function joinBoard(boardName) {

        // get all boards
        const res = await fetch("/boards");

        const boards = await res.json();

        // find board with matching NAME
        const boardExists = boards.find(
          board => board.board_name === boardName
        );

        // board not found
        if (!boardExists) {
          alert("Board not found");
          return;
        }

        // save actual board id
        boardId = boardExists.board_id;

        // join socket room
        socket.emit("join room", boardId);

        console.log("Joined board:", boardId);

        // update UI
        document.getElementById("currentBoard").innerText =
          `Current board: ${boardExists.board_name}`;

        // load tasks
        await loadTasks(boardId);
      }
          

    </script>
  </body>
</html>
