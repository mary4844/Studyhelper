<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
        <title>StudyHelper calendar</title>

        <link rel="stylesheet" href="../stylesheets/pageTop.css">
        <link rel="stylesheet" href="../stylesheets/calendar.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="page-top">
            <img class="nature-image" src="images/naturbild.png" alt="Naturbild">
            <div class="logo">
                StudyHelper
            </div>
        </div>

        <div class="header">

        </div>

        <div class="calendar">
            <div class="calendar-header">
                <button id="prev-month">&larr;</button>
                <div id="month-year"></div>
                <button id="next-month">&rarr;</button>
            </div>
            <div class="calendar-body">
                <div class="calendar-weekdays">
                    <div>Mon</div>
                    <div>Tue</div>
                    <div>Wed</div>
                    <div>Thu</div>
                    <div>Fri</div>
                    <div>Sat</div>
                    <div>Sun</div>
                </div>
                <div class="calendar-dates">
                </div>
            </div>

        </div>


        <script src="../scripts/calendar.js"></script>
    </body>
</html>
